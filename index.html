<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Ishi</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #ffe4e1;
    font-family: 'Poppins', sans-serif;
    overflow-x: hidden;
    text-align: center;
  }

  h1 {
    margin-top: 30px;
    font-size: 2.5em;
    color: #ff69b4;
  }

  .message {
    font-size: 1.2em;
    margin: 15px 20px;
    font-family: 'Comic Sans MS', cursive, sans-serif;
    color: #333;
  }

  button {
    padding: 10px 25px;
    font-size: 1.2em;
    margin: 10px;
    border: none;
    cursor: pointer;
    border-radius: 12px;
    font-family: 'Cursive', sans-serif;
  }

  #surpriseBtn {
    background: #ff69b4;
    color: white;
    font-size: 1.1em;
  }

  .choiceBtn {
    background: #ff69b4;
    color: white;
  }

  #choices {
    display: none;
  }

  #videoBox {
    display: none;
    margin-top: 20px;
  }

  video {
    max-width: 90%;
    border-radius: 15px;
  }

  /* Balloons */
  .balloon {
    position: absolute;
    width: 50px;
    height: 70px;
    background-color: #ff69b4;
    border-radius: 50% 50% 50% 50%;
    animation: float 10s infinite linear;
  }

  @keyframes float {
    0% { transform: translateY(100vh) translateX(0); }
    100% { transform: translateY(-20vh) translateX(50px); }
  }

  /* Falling hearts */
  .heart {
    position: absolute;
    font-size: 1.5em;
    color: #ff1493;
    animation: fall 7s linear infinite;
  }

  @keyframes fall {
    0% { top: -10%; }
    100% { top: 110%; }
  }

  /* Cursor sparkles */
  .sparkle {
    position: absolute;
    width: 5px;
    height: 5px;
    background: yellow;
    border-radius: 50%;
    pointer-events: none;
    animation: sparkleAnim 0.6s ease-out forwards;
  }

  @keyframes sparkleAnim {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(2); opacity: 0; }
  }
</style>
</head>
<body>

<h1>Happy Birthday Ishi 🎉</h1>

<div class="message">
  Honestly, I was going to write a normal birthday wish… but then I remembered it’s YOUR birthday 🎉 so it has to be special ✨😉
</div>

<button id="surpriseBtn" onclick="showOptions()">Want a Surprise 🎁</button>

<div id="choices">
  <button class="choiceBtn" id="yes">Yes 😄</button>
  <button class="choiceBtn" id="no">No 😢</button>
</div>

<div id="videoBox">
  <video id="bdayVideo" controls>
    <source src="https://drive.google.com/uc?export=download&id=1MzA0ykYBIBM_Z2LLo5SgkcMvlmi4J54A" type="video/mp4">
    Your browser does not support the video tag.
  </video>
</div>

<script>
  function showOptions(){
    document.getElementById("choices").style.display = "flex";
  }

  // Yes click → show video, hide all buttons
  document.getElementById("yes").onclick = function() {
    document.getElementById("videoBox").style.display = "block";
    document.getElementById("bdayVideo").play();
    document.getElementById("choices").style.display = "none";
    document.getElementById("surpriseBtn").style.display = "none";
  }

  // No click → move button
  let noBtn = document.getElementById("no");
  noBtn.onclick = function() {
    let x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
    let y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
    noBtn.style.transform = `translate(${x}px, ${y}px)`;
  }

  /* Floating balloons */
  function createBalloon(){
    let balloon = document.createElement('div');
    balloon.classList.add('balloon');
    balloon.style.left = Math.random() * window.innerWidth + 'px';
    balloon.style.backgroundColor = ['#ff69b4','#ffb6c1','#ffa500','#00bfff'][Math.floor(Math.random()*4)];
    document.body.appendChild(balloon);
    setTimeout(()=>{ balloon.remove() }, 10000);
  }
  setInterval(createBalloon, 1000);

  /* Falling hearts */
  function createHeart(){
    let heart = document.createElement('div');
    heart.classList.add('heart');
    heart.style.left = Math.random()*window.innerWidth+'px';
    heart.innerHTML = '💖';
    document.body.appendChild(heart);
    setTimeout(()=>{ heart.remove() }, 7000);
  }
  setInterval(createHeart, 800);

  /* Cursor sparkles */
  document.addEventListener('mousemove', function(e){
    let sparkle = document.createElement('div');
    sparkle.classList.add('sparkle');
    sparkle.style.left = e.pageX+'px';
    sparkle.style.top = e.pageY+'px';
    document.body.appendChild(sparkle);
    setTimeout(()=>{ sparkle.remove() }, 600);
  });
</script>

</body>
</html>
